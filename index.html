<body>

<div class="top-bar">

<section class="doacao">

<h1>Faça uma Doação ❤️</h1>

<p>Sua contribuição ajuda crianças e famílias atendidas.</p>

<form id="formDoacao">

<label>Nome</label>
<input type="text" id="nome" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Telefone</label>
<input type="text" id="telefone">

<label>Valor da Doação</label>

<select id="valor">

<option value="10">R$ 10</option>
<option value="20">R$ 20</option>
<option value="50">R$ 50</option>
<option value="100">R$ 100</option>
<option value="200">R$ 200</option>

</select>

<label>Mensagem</label>
<input type="text" id="mensagem">

<button type="submit">Realizar Doação</button>

</form>

</section>

<a href="https://wa.me/551124122186" class="whatsapp" target="_blank">
Fale conosco no WhatsApp
</a>

<footer>

<p>© 2026 Núcleo Batuíra</p>

</footer>

<!-- CHATBOT -->

<div class="chatbot-icon" onclick="abrirChat()">💬</div>

<div class="chatbot" id="chatbot">

<div class="chat-header">
Chat ONG
<span onclick="fecharChat()">X</span>
</div>

<div class="chat-body" id="chat-body">
<div class="bot">Olá! Como posso ajudar?</div>
</div>

<input type="text" id="userInput" placeholder="Digite sua mensagem...">

<button onclick="enviarMensagem()">Enviar</button>

</div>

<script src="doacao.js"></script>
<script src="chatbot.js"></script>

</body>
